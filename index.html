<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Jiwoon's Tetris</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #fdf6ee; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useEffect, useCallback, useRef } = React;

const COLS = 10, ROWS = 20;

const TETROMINOES = {
  I: { shape: [[1,1,1,1]],         color: "#a8d8ea" },
  O: { shape: [[1,1],[1,1]],       color: "#ffd6a5" },
  T: { shape: [[0,1,0],[1,1,1]],   color: "#d4a5c9" },
  S: { shape: [[0,1,1],[1,1,0]],   color: "#b5ead7" },
  Z: { shape: [[1,1,0],[0,1,1]],   color: "#ffb3b3" },
  J: { shape: [[1,0,0],[1,1,1]],   color: "#c7ceea" },
  L: { shape: [[0,0,1],[1,1,1]],   color: "#ffc8a2" },
};

const KEYS = ["I","O","T","S","Z","J","L"];
const SCORE_TABLE = [0, 100, 300, 500, 800];
const SPEEDS = [800, 700, 600, 500, 400, 300, 250, 200, 150, 100];

const rand = () => {
  const k = KEYS[Math.floor(Math.random()*KEYS.length)];
  const t = TETROMINOES[k];
  return { shape: t.shape.map(r=>[...r]), color: t.color, x: Math.floor(COLS/2)-Math.floor(t.shape[0].length/2), y: 0 };
};
const emptyBoard = () => Array.from({length:ROWS},()=>Array(COLS).fill(null));
const rotate = s => Array.from({length:s[0].length},(_,c)=>Array.from({length:s.length},(_,r)=>s[s.length-1-r][c]));

function collides(board, piece, dx=0, dy=0, shape=piece.shape) {
  for (let r=0;r<shape.length;r++) for (let c=0;c<shape[r].length;c++) {
    if (!shape[r][c]) continue;
    const nx=piece.x+c+dx, ny=piece.y+r+dy;
    if (nx<0||nx>=COLS||ny>=ROWS) return true;
    if (ny>=0&&board[ny][nx]) return true;
  }
  return false;
}

function mergeBoard(board, piece) {
  const next = board.map(r=>[...r]);
  for (let r=0;r<piece.shape.length;r++) for (let c=0;c<piece.shape[r].length;c++) {
    if (piece.shape[r][c]) { const ny=piece.y+r,nx=piece.x+c; if(ny>=0) next[ny][nx]=piece.color; }
  }
  return next;
}

function clearLines(board) {
  const kept = board.filter(row=>row.some(c=>!c));
  const count = ROWS-kept.length;
  return { board:[...Array.from({length:count},()=>Array(COLS).fill(null)),...kept], count };
}

// 뷰포트에 맞게 블록 크기 계산
function calcBlock() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const SIDE = 130; // 사이드패널 너비
  const GAP = 16;
  const PAD = 48; // 상하 여백
  const TITLE = 56; // 타이틀 높이
  const fromH = Math.floor((vh - PAD - TITLE) / ROWS);
  const fromW = Math.floor((vw - SIDE - GAP - 32) / COLS);
  return Math.max(20, Math.min(fromH, fromW));
}

function App() {
  const [block, setBlock] = useState(calcBlock);
  const [board, setBoard] = useState(emptyBoard());
  const [piece, setPiece] = useState(null);
  const [next, setNext] = useState(null);
  const [score, setScore] = useState(0);
  const [lines, setLines] = useState(0);
  const [level, setLevel] = useState(0);
  const [gameOver, setGameOver] = useState(false);
  const [started, setStarted] = useState(false);
  const [paused, setPaused] = useState(false);
  const ref = useRef({});
  ref.current = {board,piece,next,score,lines,level,gameOver,paused,started};

  useEffect(() => {
    const onResize = () => setBlock(calcBlock());
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  const B = block; // alias

  const spawn = useCallback((b, nextP) => {
    const p = nextP || rand();
    const n = rand();
    if (collides(b,p)) { setGameOver(true); setPiece(null); }
    else { setPiece(p); setNext(n); }
  },[]);

  const lock = useCallback(() => {
    const {board,piece,next,score,lines,level} = ref.current;
    if (!piece) return;
    const merged = mergeBoard(board,piece);
    const {board:cleared,count} = clearLines(merged);
    const nl = lines+count, lv = Math.floor(nl/10);
    setBoard(cleared); setScore(score+SCORE_TABLE[count]*(level+1)); setLines(nl); setLevel(lv);
    spawn(cleared, next);  // 저장된 next 블록을 다음 현재 블록으로 사용
  },[spawn]);

  const down = useCallback(()=>{
    const {board,piece,paused,gameOver} = ref.current;
    if (!piece||paused||gameOver) return;
    if (!collides(board,piece,0,1)) setPiece(p=>({...p,y:p.y+1}));
    else lock();
  },[lock]);

  useEffect(()=>{
    if (!started||gameOver||paused||!piece) return;
    const id = setInterval(down, SPEEDS[Math.min(level,9)]);
    return ()=>clearInterval(id);
  },[started,gameOver,paused,piece,level,down]);

  useEffect(()=>{
    const h = e => {
      const {board,piece,paused,gameOver,started} = ref.current;
      if (!started||gameOver) return;
      if (e.key==="p"||e.key==="P") { setPaused(v=>!v); return; }
      if (paused||!piece) return;
      if (e.key==="ArrowLeft")       { e.preventDefault(); if(!collides(board,piece,-1,0)) setPiece(p=>({...p,x:p.x-1})); }
      else if (e.key==="ArrowRight") { e.preventDefault(); if(!collides(board,piece,1,0)) setPiece(p=>({...p,x:p.x+1})); }
      else if (e.key==="ArrowDown")  { e.preventDefault(); if(!collides(board,piece,0,1)) setPiece(p=>({...p,y:p.y+1})); else lock(); }
      else if (e.key==="ArrowUp")    { e.preventDefault(); const rot=rotate(piece.shape); if(!collides(board,piece,0,0,rot)) setPiece(p=>({...p,shape:rot})); }
      else if (e.key===" ")          { e.preventDefault(); let dy=0; while(!collides(board,piece,0,dy+1)) dy++; setPiece(p=>({...p,y:p.y+dy})); setTimeout(()=>lock(),16); }
    };
    window.addEventListener("keydown",h);
    return ()=>window.removeEventListener("keydown",h);
  },[lock]);

  const start = () => {
    const b=emptyBoard();
    setBoard(b); setScore(0); setLines(0); setLevel(0); setGameOver(false); setPaused(false); setStarted(true);
    setPiece(rand()); setNext(rand());
  };

  const ghost = (() => {
    if (!piece) return null;
    let dy=0; while(!collides(board,piece,0,dy+1)) dy++;
    return {...piece,y:piece.y+dy};
  })();

  const display = board.map(r=>[...r]);
  if (ghost) for(let r=0;r<ghost.shape.length;r++) for(let c=0;c<ghost.shape[r].length;c++) {
    if(ghost.shape[r][c]){const ny=ghost.y+r,nx=ghost.x+c;if(ny>=0&&ny<ROWS&&nx>=0&&nx<COLS&&!display[ny][nx])display[ny][nx]="ghost";}
  }
  if (piece) for(let r=0;r<piece.shape.length;r++) for(let c=0;c<piece.shape[r].length;c++) {
    if(piece.shape[r][c]){const ny=piece.y+r,nx=piece.x+c;if(ny>=0&&ny<ROWS)display[ny][nx]=piece.color;}
  }

  const nextGrid = (() => {
    if (!next) return null;
    const g=Array.from({length:4},()=>Array(4).fill(null));
    const or=Math.floor((4-next.shape.length)/2), oc=Math.floor((4-next.shape[0].length)/2);
    for(let r=0;r<next.shape.length;r++) for(let c=0;c<next.shape[r].length;c++) if(next.shape[r][c]) g[r+or][c+oc]=next.color;
    return g;
  })();

  const C = {
    pageBg:  "#fdf6ee",
    boardBg: "#fffaf4",
    border:  "#e8d8c8",
    cardBg:  "#fff8f0",
    text:    "#7a5c48",
    subtext: "#c4a882",
    accent:  "#e8a598",
    ghost:   "rgba(200,170,140,0.13)",
    ghostBd: "rgba(200,170,140,0.28)",
    grid:    "rgba(220,195,170,0.4)",
    shadow:  "rgba(180,130,100,0.07)",
  };

  const NB = Math.max(14, Math.round(B * 0.62)); // next preview block size

  const card = { background:C.cardBg, border:`1px solid ${C.border}`, borderRadius:8, padding:"10px 12px", boxShadow:`0 2px 6px ${C.shadow}` };
  const labelSt = { color:C.subtext, fontSize:9, letterSpacing:4, textTransform:"uppercase", marginBottom:5 };

  return (
    <div style={{
      width:"100vw", height:"100vh",
      background:C.pageBg,
      display:"flex", flexDirection:"column",
      alignItems:"center", justifyContent:"center",
      fontFamily:"'Segoe UI',sans-serif", userSelect:"none",
      gap:10,
    }}>
      {/* Title */}
      <div style={{textAlign:"center"}}>
        <span style={{color:C.text, fontSize:15, fontWeight:400, letterSpacing:6, textTransform:"uppercase"}}>Jiwoon's Tetris</span>
      </div>

      {/* Main row */}
      <div style={{display:"flex", gap:14, alignItems:"flex-start"}}>

        {/* Board */}
        <div style={{
          position:"relative",
          width:COLS*B, height:ROWS*B,
          background:C.boardBg,
          border:`1px solid ${C.border}`,
          borderRadius:6,
          boxShadow:`0 4px 20px ${C.shadow}`,
          overflow:"hidden",
          flexShrink:0,
        }}>
          {/* Grid */}
          <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none"}}>
            {Array.from({length:ROWS+1},(_,i)=>(
              <line key={`h${i}`} x1="0" y1={i*B} x2={COLS*B} y2={i*B} stroke={C.grid} strokeWidth="0.5"/>
            ))}
            {Array.from({length:COLS+1},(_,i)=>(
              <line key={`v${i}`} x1={i*B} y1="0" x2={i*B} y2={ROWS*B} stroke={C.grid} strokeWidth="0.5"/>
            ))}
          </svg>

          {/* Cells */}
          {display.map((row,r)=>row.map((cell,c)=> cell ? (
            <div key={`${r}-${c}`} style={{
              position:"absolute",
              left:c*B+1, top:r*B+1,
              width:B-2, height:B-2,
              background: cell==="ghost" ? C.ghost : cell,
              border: cell==="ghost" ? `1px dashed ${C.ghostBd}` : `1px solid rgba(255,255,255,0.5)`,
              borderRadius:3,
              boxShadow: cell!=="ghost" ? `inset 0 2px 0 rgba(255,255,255,0.55),inset 0 -1px 0 rgba(0,0,0,0.05)` : "none",
            }}/>
          ) : null))}

          {/* Overlay */}
          {(!started||gameOver||paused)&&(
            <div style={{
              position:"absolute",inset:0,
              background:"rgba(253,246,238,0.93)",
              backdropFilter:"blur(4px)",
              display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14,
              borderRadius:6,
            }}>
              {gameOver&&<div style={{color:C.accent,fontSize:15,fontWeight:600,letterSpacing:4}}>GAME OVER</div>}
              {paused&&!gameOver&&<div style={{color:C.text,fontSize:15,fontWeight:400,letterSpacing:4}}>PAUSED</div>}
              {gameOver&&<div style={{color:C.subtext,fontSize:12}}>Score: {score.toLocaleString()}</div>}
              <button onClick={start} style={{
                padding:"9px 28px",background:"transparent",
                border:`1.5px solid ${C.accent}`,color:C.accent,
                fontSize:12,letterSpacing:4,cursor:"pointer",fontFamily:"inherit",borderRadius:5,
              }}>{gameOver?"RESTART":"START"}</button>
            </div>
          )}
        </div>

        {/* Side Panel */}
        <div style={{display:"flex",flexDirection:"column",gap:10,width:124,flexShrink:0}}>

          {/* Next */}
          <div style={card}>
            <div style={labelSt}>Next</div>
            <div style={{display:"grid",gridTemplateColumns:`repeat(4,${NB}px)`,gap:2}}>
              {(nextGrid||Array.from({length:4},()=>Array(4).fill(null))).map((row,r)=>row.map((cell,c)=>(
                <div key={`n${r}${c}`} style={{
                  width:NB,height:NB,
                  background:cell||"transparent",
                  border:cell?`1px solid rgba(255,255,255,0.45)`:`1px solid ${C.border}`,
                  borderRadius:3,
                  boxShadow:cell?`inset 0 1px 0 rgba(255,255,255,0.5)`:"none",
                }}/>
              )))}
            </div>
          </div>

          {[["Score",score.toLocaleString()],["Lines",lines],["Level",level]].map(([l,v])=>(
            <div key={l} style={card}>
              <div style={labelSt}>{l}</div>
              <div style={{color:C.text,fontSize:20,fontWeight:300}}>{v}</div>
            </div>
          ))}

          <div style={card}>
            <div style={labelSt}>Keys</div>
            {[["← →","이동"],["↑","회전"],["↓","내리기"],["Space","즉시"],["P","일시정지"]].map(([k,v])=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                <span style={{color:C.accent,fontSize:10,fontWeight:600}}>{k}</span>
                <span style={{color:C.subtext,fontSize:10}}>{v}</span>
              </div>
            ))}
          </div>

          {started&&!gameOver&&(
            <button onClick={()=>setPaused(v=>!v)} style={{
              padding:"7px 0",background:"transparent",
              border:`1px solid ${C.border}`,color:C.subtext,
              fontSize:10,letterSpacing:3,cursor:"pointer",
              fontFamily:"inherit",borderRadius:5,
            }}>{paused?"Resume":"Pause"}</button>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
